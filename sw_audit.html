<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Audit</title>
<style>
  :root{
    --primary:#005EB8;
    --primary-dark:#00468a;
    --navy:#2F425F;
    --success:#00AD83;
    --danger:#C00000;
    --warning:#F26B43;
    --info:#00A5D7;
    --bg:#F4F7FB;
    --card:#FFFFFF;
    --border:#E1E6ED;
    --tint-blue:#DCE8F5;
    --tint-green:#DCF3EC;
    --tint-red:#FBE3E3;
    --tint-orange:#FDE7DF;
    --text:#1C2733;
    --text-mute:#6B7684;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    font-size:14px; line-height:1.5; padding-bottom:40px;
  }
  #app{max-width:720px; margin:0 auto; padding:0 0 90px;}

  .topbar{
    background:linear-gradient(120deg, var(--primary) 0%, var(--primary-dark) 100%);
    color:#fff; padding:14px 16px; position:sticky; top:0; z-index:50;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .topbar-row{display:flex; align-items:center; justify-content:space-between;}
  .topbar-title{font-weight:800; font-size:17px; letter-spacing:.2px;}
  .topbar-user{font-size:12px; opacity:.9; background:rgba(255,255,255,.15); padding:4px 10px; border-radius:20px;}
  .topbar-sub{font-size:12px; opacity:.85; margin-top:4px; display:flex; gap:10px; flex-wrap:wrap;}
  .progress-dots{display:flex; gap:6px; margin-top:10px;}
  .progress-dots span{width:22px; height:5px; border-radius:3px; background:rgba(255,255,255,.35);}
  .progress-dots span.done{background:#fff;}
  .progress-dots span.active{background:#FFC978;}

  .container{padding:16px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  .section-title{
    font-size:15px; font-weight:800; color:var(--navy); margin:0 0 4px;
    display:flex; align-items:center; gap:8px;
  }
  .section-num{
    background:var(--primary); color:#fff; width:22px; height:22px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:800;
  }
  .section-goal{font-size:12.5px; color:var(--text-mute); margin:0 0 14px 30px;}

  .field{margin-bottom:12px; min-width:0;}
  .field label{display:block; font-size:12.5px; font-weight:700; color:var(--navy); margin-bottom:5px;}
  .field .req{color:var(--danger);}
  select, input[type=text], input[type=date], input[type=number], textarea{
    width:100%; max-width:100%; min-width:0; box-sizing:border-box; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; background:#fff; color:var(--text);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--primary); outline-offset:0; border-color:var(--primary);}
  textarea{resize:vertical; min-height:56px;}

  .row2{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:10px;}
  .row3{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr); gap:10px;}
  @media(max-width:480px){ .row3{grid-template-columns:minmax(0,1fr) minmax(0,1fr);} }
  /* 그리드 안의 select/input(특히 date)이 기본 min-width:auto 때문에 칸보다 넓게 삐져나가 오른쪽 정렬이 깨지는 문제 방지 */
  .row2 > *, .row3 > *{ min-width:0; }

  .btn{
    border:none; border-radius:8px; padding:10px 16px; font-size:13.5px; font-weight:700;
    cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.15s;
  }
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-secondary{background:#EDF2F8; color:var(--navy);}
  .btn-secondary:hover{background:#E1E9F2;}
  .btn-outline{background:#fff; border:1px solid var(--primary); color:var(--primary);}
  .btn-sm{padding:6px 10px; font-size:12px;}
  .btn-block{width:100%; justify-content:center;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}

  .toggle-group{display:flex; gap:8px;}
  .toggle-btn{
    flex:1; padding:11px; border-radius:8px; border:1.5px solid var(--border); background:#fff;
    font-weight:800; font-size:13.5px; cursor:pointer; color:var(--text-mute); text-align:center;
  }
  .toggle-btn.ok.active{background:var(--tint-green); border-color:var(--success); color:var(--success);}
  .toggle-btn.nok.active{background:var(--tint-red); border-color:var(--danger); color:var(--danger);}

  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:800;}
  .badge-ok{background:var(--tint-green); color:var(--success);}
  .badge-nok{background:var(--tint-red); color:var(--danger);}
  .badge-neutral{background:#EEF1F5; color:var(--text-mute);}
  .badge-high{background:var(--tint-red); color:var(--danger);}
  .badge-medium{background:var(--tint-orange); color:var(--warning);}
  .badge-low{background:var(--tint-blue); color:var(--primary);}

  .coach-box{
    margin-top:10px; padding:12px; background:#FFF8EE; border:1px dashed #F0C480; border-radius:8px;
  }
  .coach-box .coach-label{font-size:12px; font-weight:800; color:#B9791A; margin-bottom:6px;}

  .gap-box{
    margin-top:12px; padding:14px; background:var(--tint-red); border:1px solid #F3B9B9; border-radius:8px;
  }
  .gap-box .gap-title{font-weight:800; color:var(--danger); font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  .repeat-box{background:#fff; border:1px solid var(--border); border-radius:8px; padding:10px; margin-top:8px;}
  .repeat-item{display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
  .repeat-item:last-child{border-bottom:none;}

  .kp-table{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:6px;}
  .kp-table th, .kp-table td{border:1px solid var(--border); padding:6px; text-align:center;}
  .kp-table th{background:#F1F5FA; color:var(--navy); font-size:11.5px;}
  .kp-table td.kp-text{text-align:left; font-weight:600;}
  .kp-cell{cursor:pointer; font-weight:800;}
  .kp-cell.ok{color:var(--success);}
  .kp-cell.nok{color:var(--danger);}
  .kp-cell.empty{color:#C9D2DC;}
  .kp-row-nok{background:var(--tint-red);}

  .evidence-grid{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .evidence-thumb{position:relative; width:64px; height:64px; border-radius:6px; overflow:hidden; border:1px solid var(--border);}
  .evidence-thumb img{width:100%; height:100%; object-fit:cover;}
  .evidence-thumb .rm{position:absolute; top:1px; right:1px; background:rgba(0,0,0,.6); color:#fff; border:none; width:16px; height:16px; border-radius:50%; font-size:10px; cursor:pointer;}
  .evidence-add{width:64px; height:64px; border:1.5px dashed var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-mute); font-size:20px;}

  .imp-card{border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; background:#FBFCFE; position:relative;}
  .imp-card .rm-card{position:absolute; top:8px; right:8px; background:none; border:none; color:var(--text-mute); cursor:pointer; font-size:16px;}

  .summary-table{width:100%; border-collapse:collapse; font-size:13px;}
  .summary-table td{padding:9px 6px; border-bottom:1px solid var(--border);}
  .summary-table td:first-child{color:var(--navy); font-weight:700;}
  .summary-table td:last-child{text-align:right;}

  .gap-preview{padding:9px 10px; border:1px solid var(--border); border-radius:8px; margin-top:6px; font-size:12.5px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
  .gap-preview:hover{background:#F7FAFD;}

  .bottom-bar{
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border);
    padding:10px 16px; display:flex; gap:10px; z-index:60; box-shadow:0 -2px 10px rgba(0,0,0,.06);
  }
  .bottom-bar-inner{max-width:720px; margin:0 auto; display:flex; gap:10px; width:100%;}

  .empty-state{text-align:center; padding:50px 20px; color:var(--text-mute);}
  .empty-state .icon{font-size:36px; margin-bottom:10px;}

  table.list-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.list-table th{background:#F1F5FA; color:var(--navy); padding:8px 6px; text-align:left; font-size:11.5px;}
  table.list-table td{padding:9px 6px; border-bottom:1px solid var(--border);}
  table.list-table tr:hover td{background:#F7FAFD; cursor:pointer;}

  .fab{
    position:fixed; bottom:20px; right:20px; background:var(--primary); color:#fff; border:none;
    border-radius:50px; padding:14px 20px; font-weight:800; font-size:14px; box-shadow:0 4px 14px rgba(0,94,184,.4);
    cursor:pointer; z-index:55;
  }

  .add-inline{display:flex; gap:6px; margin-top:2px;}
  .add-inline input{flex:1;}
  .back-btn{
    background:rgba(255,255,255,.18); border:none; color:#fff; width:30px; height:30px; border-radius:8px;
    font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-right:8px; flex-shrink:0;
  }
  .topbar-title-row{display:flex; align-items:center;}

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:200;
    background:var(--navy); color:#fff; padding:12px 18px; border-radius:10px; font-size:13px; font-weight:700;
    box-shadow:0 4px 16px rgba(0,0,0,.25); max-width:88%; text-align:center; line-height:1.5;
    animation:toast-in .2s ease-out;
  }
  .toast.toast-error{background:var(--danger);}
  .toast.toast-success{background:var(--success);}
  @keyframes toast-in{ from{opacity:0; transform:translateX(-50%) translateY(-10px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

  .btn-danger-outline{background:#fff; border:1px solid var(--danger); color:var(--danger);}
  .btn-danger-outline:hover{background:var(--tint-red);}
  .row-del-btn{background:none; border:none; color:var(--text-mute); font-size:14px; cursor:pointer; padding:4px 6px;}
  .row-del-btn:hover{color:var(--danger);}
  .del-confirm{display:inline-flex; gap:4px; align-items:center;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(20,30,45,.55); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .modal{background:#fff; border-radius:14px; padding:24px; max-width:360px; width:100%;}
  .modal h3{margin:0 0 6px; color:var(--navy);}
  .modal p{color:var(--text-mute); font-size:13px; margin:0 0 16px;}

  .hint{font-size:11.5px; color:var(--text-mute); margin-top:4px;}
  a.plain, span.plain{color:var(--primary); text-decoration:none; font-weight:700; cursor:pointer;}
  .divider{height:1px; background:var(--border); margin:14px 0;}
  .flex-between{display:flex; justify-content:space-between; align-items:center;}

  .nav-tabs{display:flex; gap:4px; padding:0 16px; margin-top:12px;}
  .nav-tab{
    flex:1; text-align:center; padding:9px 0; border-radius:8px 8px 0 0; font-size:12.5px; font-weight:700;
    color:rgba(255,255,255,.75); cursor:pointer; background:rgba(255,255,255,.08);
  }
  .nav-tab.active{background:var(--bg); color:var(--primary);}

  .filter-bar{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .filter-bar select{width:auto; min-width:100px; font-size:12.5px; padding:7px 10px;}
  .filter-chip{font-size:11px; padding:4px 10px; border-radius:16px; border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--text-mute);}
  .filter-chip.active{background:var(--primary); color:#fff; border-color:var(--primary);}

  .repeat-flag{color:var(--warning); font-weight:800;}
  .kv-row{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
  .kv-row .k{color:var(--text-mute);}
  .kv-row .v{font-weight:700; color:var(--navy); text-align:right;}
  .status-select{width:auto; display:inline-block;}

  .kpi-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .kpi-card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px; cursor:pointer;}
  .kpi-card:hover{border-color:var(--primary);}
  .kpi-label{font-size:11px; color:var(--text-mute); font-weight:700;}
  .kpi-value{font-size:22px; font-weight:800; color:var(--navy); margin:4px 0 2px;}
  .kpi-delta{font-size:11px; font-weight:700;}
  .kpi-delta.up-good{color:var(--success);}
  .kpi-delta.up-bad{color:var(--danger);}
  .kpi-delta.down-good{color:var(--success);}
  .kpi-delta.down-bad{color:var(--danger);}

  .trend-wrap{overflow-x:auto;}
  .rank-row{display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
  .rank-row.low{background:var(--tint-red);}
  .rank-bar-bg{flex:1; background:#EEF1F5; border-radius:4px; height:8px; overflow:hidden;}
  .rank-bar-fill{height:100%; background:var(--primary); border-radius:4px;}
  .dash-two-col{display:grid; grid-template-columns:1fr; gap:14px;}
  @media(min-width:640px){ .dash-two-col{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================= 고정 마스터 데이터 ============================= */
const REGIONS = [
  {id:'ALAO', name:'ALAO'},
  {id:'EMEA', name:'EMEA'},
  {id:'MOTTROL', name:'MOTTROL'},
  {id:'NA', name:'NA'},
];
const SITES = [
  {id:'chennai', name:'Chennai', regionId:'ALAO'},
  {id:'incheon', name:'Incheon', regionId:'ALAO'},
  {id:'suzhou', name:'Suzhou', regionId:'ALAO'},
  {id:'yantai', name:'Yantai', regionId:'ALAO'},
  {id:'dobris', name:'Dobris', regionId:'EMEA'},
  {id:'pontchateau', name:'Pontchateau', regionId:'EMEA'},
  {id:'changwon', name:'Changwon', regionId:'MOTTROL'},
  {id:'bismarck', name:'Bismarck', regionId:'NA'},
  {id:'gwinner', name:'Gwinner', regionId:'NA'},
  {id:'johnsoncreek', name:'Johnson creek', regionId:'NA'},
  {id:'litchfield', name:'Litchfield', regionId:'NA'},
  {id:'monterrey', name:'Monterrey', regionId:'NA'},
  {id:'rogers', name:'Rogers', regionId:'NA'},
  {id:'statesville', name:'Statesville', regionId:'NA'},
  {id:'wahpeton', name:'Wahpeton', regionId:'NA'},
];
const TRIGGERS = [
  {id:'regular', name:'정기 감사'},
  {id:'npi', name:'신제품 도입/공정 안정화'},
  {id:'change', name:'변경 발생 (제품/공정/설비/레이아웃/자재/방법)'},
  {id:'issue', name:'문제 발생 (품질/안전/근접사고/반복정지/고객클레임)'},
  {id:'training', name:'교육 또는 교대 후'},
];
const GAP_CATEGORIES = ['Safety','Quality','Standard Not Followed','Improvement'];
const RISK_LEVELS = ['High','Medium','Low'];
const ACTION_TYPES = ['훈련','SW문서 업데이트','5S/레이아웃 개선','설비 요청','Improvement 실행','기타'];

/* ============================= Storage 헬퍼 ============================= */
async function sGet(key, shared=false){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, value, shared=false){
  try{ return await window.storage.set(key, JSON.stringify(value), shared); }
  catch(e){ console.error('storage set fail', key, e); return null; }
}
async function sDelete(key, shared=false){
  try{ return await window.storage.delete(key, shared); }
  catch(e){ console.error('storage delete fail', key, e); return null; }
}

/* ============================= 유틸 ============================= */
function uid(prefix){ return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function todayStr(){ const d = new Date(); return d.toISOString().slice(0,10); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let TOAST_TIMER = null;
function toast(message, type){
  const old = document.getElementById('sw-toast');
  if(old) old.remove();
  if(TOAST_TIMER) clearTimeout(TOAST_TIMER);
  const div = document.createElement('div');
  div.id = 'sw-toast';
  div.className = 'toast' + (type ? ' toast-'+type : '');
  div.innerHTML = message.replace(/\n/g,'<br>');
  document.body.appendChild(div);
  TOAST_TIMER = setTimeout(() => { div.remove(); }, 3800);
}
function goBack(url){
  if(location.hash === url){ route(); } else { location.hash = url; }
}

/* ============================= 공통 삭제 기능 (테스트용) ============================= */
let DELETE_CONFIRM_ID = null;
function deleteButtonHtml(type, id){
  const key = type+':'+id;
  if(DELETE_CONFIRM_ID === key){
    return `<span class="del-confirm" onclick="event.stopPropagation()">
      <button type="button" class="btn btn-sm btn-danger-outline" onclick="event.stopPropagation(); confirmDelete('${type}','${id}')">삭제확인</button>
      <button type="button" class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); DELETE_CONFIRM_ID=null; rerenderCurrent();">취소</button>
    </span>`;
  }
  return `<button type="button" class="row-del-btn" onclick="event.stopPropagation(); DELETE_CONFIRM_ID='${key}'; rerenderCurrent();" title="삭제">🗑</button>`;
}
function rerenderCurrent(){ route(); }
async function confirmDelete(type, id){
  const map = { audit:{key:'audit:', idx:'index:audits', backUrl:'#/audits'},
    gap:{key:'gap:', idx:'index:gaps', backUrl:'#/gaps'},
    action:{key:'action:', idx:'index:actions', backUrl:'#/actions'} };
  const m = map[type];
  await sDelete(m.key+id, true);
  let idx = (await sGet(m.idx, true)) || [];
  idx = idx.filter(x=>x!==id);
  await sSet(m.idx, idx, true);
  DELETE_CONFIRM_ID = null;
  toast(id+' 이(가) 삭제되었습니다.', 'success');
  if(location.hash.indexOf('/'+id) !== -1){
    location.hash = m.backUrl;
  } else {
    rerenderCurrent();
  }
}

async function nextAuditId(){
  const ymd = todayStr().replace(/-/g,'');
  const key = 'counter:audit:'+ymd;
  let seq = (await sGet(key, true)) || 0;
  seq += 1;
  await sSet(key, seq, true);
  return 'SWA-'+ymd+'-'+String(seq).padStart(3,'0');
}
async function nextGapId(){
  let seq = (await sGet('counter:gap', true)) || 0;
  seq += 1;
  await sSet('counter:gap', seq, true);
  return 'G-'+String(seq).padStart(4,'0');
}
async function nextActionId(){
  let seq = (await sGet('counter:action', true)) || 0;
  seq += 1;
  await sSet('counter:action', seq, true);
  return 'A-'+String(seq).padStart(4,'0');
}

function compressImage(file, maxWidth=800, quality=0.6){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================= 마스터 데이터(동적) ============================= */
async function getMasterList(type){ return (await sGet('master:'+type, true)) || []; }
async function addMasterItem(type, name, parentField, parentId){
  const list = await getMasterList(type);
  const id = uid(type);
  list.push({id, name, [parentField]: parentId});
  await sSet('master:'+type, list, true);
  return id;
}

/* ============================= 전역 상태 ============================= */
let CURRENT_USER = null;
let ROUTE = {name:'audits'};
let DRAFT = null;
let MASTER = { areas:[], lines:[], stations:[], shifts:[], operators:[] };

/* ============================= 라우터 ============================= */
window.addEventListener('hashchange', route);
async function boot(){
  CURRENT_USER = await sGet('user:current', false);
  MASTER.areas = await getMasterList('areas');
  MASTER.lines = await getMasterList('lines');
  MASTER.stations = await getMasterList('stations');
  MASTER.shifts = await getMasterList('shifts');
  MASTER.operators = await getMasterList('operators');
  route();
}
function parseHash(){
  const h = location.hash.replace('#','').split('/').filter(Boolean);
  if(h.length===0 || h[0]==='dashboard') return {name:'dashboard'};
  if(h[0]==='audits' && h[1]==='new') return {name:'new'};
  if(h[0]==='audits' && h[1] && h[2]==='evaluate') return {name:'evaluate', id:h[1]};
  if(h[0]==='audits' && h[1] && h[2]==='done') return {name:'done', id:h[1]};
  if(h[0]==='audits') return {name:'list'};
  if(h[0]==='gaps' && h[1]) return {name:'gapDetail', id:h[1]};
  if(h[0]==='gaps') return {name:'gapList'};
  if(h[0]==='actions' && h[1]) return {name:'actionDetail', id:h[1]};
  if(h[0]==='actions') return {name:'actionList'};
  return {name:'dashboard'};
}
async function route(){
  if(!CURRENT_USER){ renderOnboarding(); return; }
  ROUTE = parseHash();
  if(ROUTE.name==='dashboard') await renderDashboard();
  else if(ROUTE.name==='list') await renderAuditList();
  else if(ROUTE.name==='new') await renderAuditNew();
  else if(ROUTE.name==='evaluate') await renderEvaluate(ROUTE.id);
  else if(ROUTE.name==='done') await renderDone(ROUTE.id);
  else if(ROUTE.name==='gapList') await renderGapList();
  else if(ROUTE.name==='gapDetail') await renderGapDetail(ROUTE.id);
  else if(ROUTE.name==='actionList') await renderActionList();
  else if(ROUTE.name==='actionDetail') await renderActionDetail(ROUTE.id);
}

/* ============================= 공통 상단바 ============================= */
function topbar(subtitle, sectionDone, activeTab, backUrl){
  // sectionDone: 각 섹션의 완료 여부를 담은 boolean 배열 (예: [true,true,false,false,false,false])
  // 흰색(done) = 완료된 섹션, 주황색(active) = 순서상 다음으로 채워야 할 섹션 (앞 단계가 끝나야 다음이 켜짐)
  let dots = '';
  if(sectionDone && sectionDone.length){
    const firstIncomplete = sectionDone.findIndex(d => !d);
    const activeIdx = firstIncomplete === -1 ? sectionDone.length : firstIncomplete + 1; // 1-indexed
    for(let i=1;i<=sectionDone.length;i++){
      let cls;
      if(sectionDone[i-1]) cls = 'done';
      else if(i === activeIdx) cls = 'active';
      else cls = '';
      dots += `<span class="${cls}"></span>`;
    }
  }
  const tabs = activeTab ? `
    <div class="nav-tabs">
      <div class="nav-tab ${activeTab==='dashboard'?'active':''}" onclick="location.hash='#/dashboard'">📊 Dashboard</div>
      <div class="nav-tab ${activeTab==='audits'?'active':''}" onclick="location.hash='#/audits'">📋 Audit</div>
      <div class="nav-tab ${activeTab==='gaps'?'active':''}" onclick="location.hash='#/gaps'">⚠ Gap</div>
      <div class="nav-tab ${activeTab==='actions'?'active':''}" onclick="location.hash='#/actions'">🔧 Action</div>
    </div>` : '';
  const backBtn = backUrl ? `<button type="button" class="back-btn" onclick="goBack('${backUrl}')">←</button>` : '';
  return `
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-title-row">${backBtn}<div class="topbar-title">🔧 SW Audit</div></div>
      <div class="topbar-user">👤 ${esc(CURRENT_USER.name)}</div>
    </div>
    ${subtitle ? `<div class="topbar-sub">${subtitle}</div>` : ''}
    ${sectionDone && sectionDone.length ? `<div class="progress-dots">${dots}</div>` : ''}
    ${tabs}
  </div>`;
}

let GAP_FILTERS = { status:'open', category:'all', risk:'all', repeatOnly:false };

async function renderGapList(){
  const ids = (await sGet('index:gaps', true)) || [];
  let gaps = (await Promise.all(ids.map(id => sGet('gap:'+id, true)))).filter(Boolean);
  gaps.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));

  let filtered = gaps.filter(g => {
    if(GAP_FILTERS.status==='open' && g.status==='Closed') return false;
    if(GAP_FILTERS.status!=='all' && GAP_FILTERS.status!=='open' && g.status!==GAP_FILTERS.status) return false;
    if(GAP_FILTERS.category!=='all' && g.category!==GAP_FILTERS.category) return false;
    if(GAP_FILTERS.risk!=='all' && g.riskLevel!==GAP_FILTERS.risk) return false;
    if(GAP_FILTERS.repeatOnly && !g.isRepeat) return false;
    return true;
  });

  const riskRank = {High:0, Medium:1, Low:2};
  filtered.sort((a,b) => riskRank[a.riskLevel]-riskRank[b.riskLevel] || (b.createdAt||'').localeCompare(a.createdAt||''));

  let rows = '';
  if(filtered.length===0){
    rows = `<div class="empty-state"><div class="icon">✅</div>조건에 맞는 Gap이 없습니다.</div>`;
  } else {
    rows = `<table class="list-table"><thead><tr>
      <th>Gap ID</th><th>Category</th><th>Risk</th><th>Station</th><th>Status</th><th></th>
    </tr></thead><tbody>`;
    for(const g of filtered){
      const station = MASTER.stations.find(s=>s.id===g.stationId);
      const statusBadge = g.status==='Open' ? '<span class="badge badge-nok">Open</span>'
        : g.status==='In Progress' ? '<span class="badge badge-medium">진행중</span>'
        : '<span class="badge badge-ok">Closed</span>';
      rows += `<tr onclick="location.hash='#/gaps/${g.id}'">
        <td>${esc(g.id)} ${g.isRepeat?'<span class="repeat-flag">🔁</span>':''}</td>
        <td>${esc(g.category)}</td>
        <td><span class="badge badge-${g.riskLevel.toLowerCase()}">${g.riskLevel}</span></td>
        <td>${esc(station?station.name:'-')}</td>
        <td>${statusBadge}</td>
        <td>${deleteButtonHtml('gap', g.id)}</td>
      </tr>`;
    }
    rows += `</tbody></table>`;
  }

  document.getElementById('app').innerHTML = `
    ${topbar('Gap 관리', null, 'gaps')}
    <div class="container">
      <div class="card">
        <div class="filter-bar">
          <select onchange="GAP_FILTERS.status=this.value; renderGapList();">
            <option value="open" ${GAP_FILTERS.status==='open'?'selected':''}>Open+진행중</option>
            <option value="all" ${GAP_FILTERS.status==='all'?'selected':''}>전체 상태</option>
            <option value="Open" ${GAP_FILTERS.status==='Open'?'selected':''}>Open만</option>
            <option value="In Progress" ${GAP_FILTERS.status==='In Progress'?'selected':''}>진행중만</option>
            <option value="Closed" ${GAP_FILTERS.status==='Closed'?'selected':''}>Closed만</option>
          </select>
          <select onchange="GAP_FILTERS.category=this.value; renderGapList();">
            <option value="all">전체 Category</option>
            ${GAP_CATEGORIES.map(c=>`<option value="${c}" ${GAP_FILTERS.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <select onchange="GAP_FILTERS.risk=this.value; renderGapList();">
            <option value="all">전체 Risk</option>
            ${RISK_LEVELS.map(r=>`<option value="${r}" ${GAP_FILTERS.risk===r?'selected':''}>${r}</option>`).join('')}
          </select>
          <div class="filter-chip ${GAP_FILTERS.repeatOnly?'active':''}" onclick="GAP_FILTERS.repeatOnly=!GAP_FILTERS.repeatOnly; renderGapList();">🔁 Repeat만</div>
        </div>

      </div>
    </div>
  `;

function actionStatusBadge(a){

  return '<span class="badge badge-neutral">대기</span>';
}
function actionSourceLabel(a){
  if(a.gapId) return a.gapId;

}

async function createActionForGap(gapId){
  const actionType = document.getElementById('new-action-type').value;
  const description = document.getElementById('new-action-desc').value.trim();
  const ownerName = document.getElementById('new-action-owner').value.trim();
  const dueDate = document.getElementById('new-action-due').value;
  if(!description || !ownerName || !dueDate){ toast('Description, Owner, Due Date를 모두 입력해주세요.', 'error'); return; }

  const id = await nextActionId();
  const record = {
    id, gapId, sourceType:'gap', auditId:null, improvementId:null, actionType, description, ownerName, dueDate,
    status:'Not Started', completedAt:null, completionNotes:'', completionEvidence:[],
    effectivenessEval:'', effectivenessComment:'', reauditNeeded:null,
    createdAt: new Date().toISOString(),
  };
  await sSet('action:'+id, record, true);
  const idx = (await sGet('index:actions', true)) || [];
  idx.push(id); await sSet('index:actions', idx, true);

  const gap = await sGet('gap:'+gapId, true);
  if(gap && gap.status === 'Open'){ gap.status = 'In Progress'; await sSet('gap:'+gapId, gap, true); }

  location.hash = '#/actions/'+id;
}

async function updateGapField(id, field, value){
  const gap = await sGet('gap:'+id, true);

  gap[field] = value;
  await sSet('gap:'+id, gap, true);
  renderGapDetail(id);
}
async function addGapEvidence(e, id){
  const file = e.target.files[0]; if(!file) return;
  const dataUrl = await compressImage(file);
  const gap = await sGet('gap:'+id, true);
  gap.evidence.push({photoUrl:dataUrl, beforeAfter:'N-A', description:''});
  await sSet('gap:'+id, gap, true);
  renderGapDetail(id);
}
async function removeGapEvidence(id, idx){
  const gap = await sGet('gap:'+id, true);

  await sSet('gap:'+id, gap, true);
  renderGapDetail(id);
}

/* ============================= P5-1 Corrective Action 목록 ============================= */
let ACTION_FILTERS = { status:'incomplete', type:'all' };

async function renderActionList(){
  const ids = (await sGet('index:actions', true)) || [];
  let actions = (await Promise.all(ids.map(id => sGet('action:'+id, true)))).filter(Boolean);

  let filtered = actions.filter(a => {
    const overdue = a.dueDate && a.dueDate < todayStr() && a.status !== 'Completed';
    if(ACTION_FILTERS.status==='incomplete' && a.status==='Completed') return false;
    if(ACTION_FILTERS.status==='overdue' && !overdue) return false;
    if(ACTION_FILTERS.status!=='incomplete' && ACTION_FILTERS.status!=='overdue' && ACTION_FILTERS.status!=='all' && a.status!==ACTION_FILTERS.status) return false;
    if(ACTION_FILTERS.type!=='all' && a.actionType!==ACTION_FILTERS.type) return false;
    return true;
  });
  filtered.sort((a,b) => {
    const aOver = a.dueDate && a.dueDate < todayStr() && a.status !== 'Completed';
    const bOver = b.dueDate && b.dueDate < todayStr() && b.status !== 'Completed';
    if(aOver !== bOver) return aOver ? -1 : 1;
    return (a.dueDate||'').localeCompare(b.dueDate||'');
  });

  let rows = '';

let COMPLETE_EVIDENCE_BUFFER = [];
async function addCompleteEvidence(e){
  const file = e.target.files[0]; if(!file) return;
  const dataUrl = await compressImage(file);
  COMPLETE_EVIDENCE_BUFFER.push({photoUrl:dataUrl, beforeAfter:'N-A', description:''});
  const grid = document.getElementById('complete-ev-grid');
  grid.innerHTML = COMPLETE_EVIDENCE_BUFFER.map((ev,i)=>`<div class="evidence-thumb"><img src="${ev.photoUrl}"></div>`).join('');
}

async function updateActionField(id, field, value){
  const a = await sGet('action:'+id, true);
  if(!a) return;
  a[field] = value;
  await sSet('action:'+id, a, true);
  renderActionDetail(id);
}

async function completeAction(id){
  const notes = document.getElementById('complete-notes').value.trim();
  if(!notes){ toast('완료 내용을 입력해주세요.', 'error'); return; }
  const a = await sGet('action:'+id, true);
  a.status = 'Completed';
  a.completedAt = new Date().toISOString();
  a.completionNotes = notes;
  a.completionEvidence = COMPLETE_EVIDENCE_BUFFER;
  await sSet('action:'+id, a, true);
  COMPLETE_EVIDENCE_BUFFER = [];

  if(a.gapId){
    const siblingActions = await getActionsForGap(a.gapId);
    const allDone = siblingActions.every(x => x.id===id ? true : x.status==='Completed');
    if(allDone){
      const gap = await sGet('gap:'+a.gapId, true);
      if(gap){ gap.status = 'Closed'; await sSet('gap:'+a.gapId, gap, true); }
    }
    toast('Action이 완료 처리되었습니다.', 'success');
    location.hash = '#/gaps/'+a.gapId;
  } else {
    toast('Action이 완료 처리되었습니다.', 'success');
    location.hash = '#/actions/'+id;
  }
}

const FIELD_CONFIG = {
  area:     {plural:'areas',     parentField:'siteId', draftField:'areaId',     resetFields:['lineId','stationId']},
  line:     {plural:'lines',     parentField:'areaId', draftField:'lineId',     resetFields:['stationId']},
  station:  {plural:'stations',  parentField:'lineId', draftField:'stationId',  resetFields:[]},
  shift:    {plural:'shifts',    parentField:'siteId', draftField:'shiftId',    resetFields:[]},
  operator: {plural:'operators', parentField:'siteId', draftField:'operatorId', resetFields:[]},
};
let ADD_MODE_FIELD = null;
let MANAGE_MODE_FIELD = null;
let MASTER_DELETE_CONFIRM_ID = null;

function addDropdownWithCreate(type, label, items, selectedId, disabled, required){
  if(ADD_MODE_FIELD === type){
    return `
    <div class="field">
      <label>${label} ${required?'<span class="req">*</span>':''}</label>
      <div class="add-inline">
        <input type="text" id="add-input-${type}" placeholder="새 ${label} 이름 입력" autofocus>
        <button type="button" class="btn btn-sm btn-primary" onclick="confirmAddMaster('${type}')">추가</button>
        <button type="button" class="btn btn-sm btn-secondary" onclick="cancelAddMaster()">취소</button>
      </div>
    </div>`;
  }
  if(MANAGE_MODE_FIELD === type){
    return renderManagePanel(type, label, items);
  }
  return `
  <div class="field">
    <label>${label} ${required?'<span class="req">*</span>':''}</label>
    <select id="f-${type}" onchange="onMasterFieldChange('${type}', this.value)" ${disabled?'disabled':''}>
      ${selectOptions(items, selectedId, '선택')}
      <option value="__add__">+ 새 ${label} 추가</option>
    </select>
    ${items.length ? `<div class="hint" style="margin-top:4px; cursor:pointer; color:var(--primary); font-weight:700;" onclick="openManageMaster('${type}')">🗑 옵션 관리/삭제</div>` : ''}
  </div>`;
}

function renderManagePanel(type, label, items){
  let rows = items.map(it => {
    const key = type+':'+it.id;
    if(MASTER_DELETE_CONFIRM_ID === key){
      return `<div class="repeat-item"><span>${esc(it.name)}</span>
        <span class="del-confirm">
          <button type="button" class="btn btn-sm btn-danger-outline" onclick="confirmDeleteMaster('${type}','${it.id}')">삭제확인</button>
          <button type="button" class="btn btn-sm btn-secondary" onclick="MASTER_DELETE_CONFIRM_ID=null; renderNewForm();">취소</button>
        </span></div>`;
    }
    return `<div class="repeat-item"><span>${esc(it.name)}</span>
      <button type="button" class="row-del-btn" onclick="MASTER_DELETE_CONFIRM_ID='${key}'; renderNewForm();" title="삭제">🗑 삭제</button></div>`;
  }).join('');
  if(!items.length) rows = '<div class="hint">등록된 항목이 없습니다.</div>';
  return `
  <div class="field">
    <label>${label} 옵션 관리</label>
    <div class="repeat-box">${rows}</div>
    <button type="button" class="btn btn-sm btn-secondary btn-block" style="margin-top:6px;" onclick="closeManageMaster()">닫기</button>
  </div>`;
}
function openManageMaster(type){ MANAGE_MODE_FIELD = type; MASTER_DELETE_CONFIRM_ID = null; renderNewForm(); }
function closeManageMaster(){ MANAGE_MODE_FIELD = null; MASTER_DELETE_CONFIRM_ID = null; renderNewForm(); }

async function confirmDeleteMaster(type, id){
  const cfg = FIELD_CONFIG[type];

  // 이미 제출된 Audit에서 이 옵션을 사용 중인지 확인 (참고용, 삭제는 마스터 목록에서만 이뤄지고 과거 기록은 보존됨)
  const auditIds = (await sGet('index:audits', true)) || [];
  const audits = (await Promise.all(auditIds.map(aid => sGet('audit:'+aid, true)))).filter(Boolean);
  const usageCount = audits.filter(a => a[cfg.draftField] === id).length;

  let list = await getMasterList(cfg.plural);
  list = list.filter(x => x.id !== id);
  await sSet('master:'+cfg.plural, list, true);
  MASTER[cfg.plural] = list;

  // 현재 작성 중인 Draft에서 선택되어 있던 옵션이면 선택 해제 (하위 필드도 함께 초기화)
  if(DRAFT[cfg.draftField] === id){
    DRAFT[cfg.draftField] = '';
    cfg.resetFields.forEach(f => DRAFT[f] = '');
  }

  MASTER_DELETE_CONFIRM_ID = null;
  MANAGE_MODE_FIELD = null;
  toast(usageCount > 0 ? `삭제되었습니다. (과거 제출된 Audit ${usageCount}건의 기록에는 영향 없음)` : '삭제되었습니다.', 'success');
  renderNewForm();
}

function onRegionChange(v){ DRAFT.regionId=v; DRAFT.siteId=''; DRAFT.areaId=''; DRAFT.lineId=''; DRAFT.stationId=''; DRAFT.shiftId=''; DRAFT.operatorId=''; renderNewForm(); }
function onSiteChange(v){ DRAFT.siteId=v; DRAFT.areaId=''; DRAFT.lineId=''; DRAFT.stationId=''; DRAFT.shiftId=''; DRAFT.operatorId=''; renderNewForm(); }

function onMasterFieldChange(type, value){
  const cfg = FIELD_CONFIG[type];
  if(value === '__add__'){
    ADD_MODE_FIELD = type;
    renderNewForm();
    return;
  }
  DRAFT[cfg.draftField] = value;
  cfg.resetFields.forEach(f => DRAFT[f] = '');
  renderNewForm();
}
async function confirmAddMaster(type){
  const cfg = FIELD_CONFIG[type];
  const input = document.getElementById('add-input-'+type);
  const name = input ? input.value.trim() : '';
  if(!name){ input && input.focus(); return; }
  const parentId = DRAFT[cfg.parentField];
  const id = await addMasterItem(cfg.plural, name, cfg.parentField, parentId);
  MASTER[cfg.plural] = await getMasterList(cfg.plural);
  DRAFT[cfg.draftField] = id;
  cfg.resetFields.forEach(f => DRAFT[f] = '');
  ADD_MODE_FIELD = null;
  renderNewForm();
}
function cancelAddMaster(){
  ADD_MODE_FIELD = null;
  renderNewForm();
}

function validateBasicInfo(){
  const req = [
    ['regionId','Region'], ['siteId','Site'], ['areaId','Area'], ['lineId','Line'],
    ['stationId','Station'], ['shiftId','Shift'], ['date','Date'], ['operatorId','Operator'], ['trigger','Audit Trigger'],
  ];
  const missing = [];
  for(const [k,label] of req){ if(!DRAFT[k]){ missing.push(label); } }
  return missing;
}
async function saveDraftAndExit(){
  await sSet('audit:'+DRAFT.id, DRAFT, true);
  const idx = (await sGet('index:audits', true)) || [];
  if(!idx.includes(DRAFT.id)){ idx.push(DRAFT.id); await sSet('index:audits', idx, true); }
  location.hash = '#/audits';
}
async function goToEvaluate(){
  const missing = validateBasicInfo();
  if(missing.length){ toast('다음 항목을 입력해주세요: ' + missing.join(', '), 'error'); return; }
  await sSet('audit:'+DRAFT.id, DRAFT, true);
  const idx = (await sGet('index:audits', true)) || [];
  if(!idx.includes(DRAFT.id)){ idx.push(DRAFT.id); await sSet('index:audits', idx, true); }
  location.hash = '#/audits/'+DRAFT.id+'/evaluate';
}

/* ============================= P2-3 Audit 평가 ============================= */
async function renderEvaluate(id){
  if(!DRAFT || DRAFT.id !== id){
    DRAFT = await sGet('audit:'+id, true);
    if(!DRAFT){ location.hash='#/audits'; return; }
  }
  renderEvaluateForm();
}

function locationLabel(){
  const site = SITES.find(s=>s.id===DRAFT.siteId);
  const station = MASTER.stations.find(s=>s.id===DRAFT.stationId);
  const line = MASTER.lines.find(l=>l.id===DRAFT.lineId);
  return `${site?site.name:''} · ${line?line.name:''} · ${station?station.name:''}`;
}

// NOK로 판정되어 생성된 Gap이 실제로 작성됐는지 확인 (Description/Standard Requirement가 비어있으면 미완료로 취급)
function gapFilled(gap){
  return !!(gap && gap.description && gap.description.trim() && gap.standardRequirement && gap.standardRequirement.trim());
}

function computeSectionDone(){
  // 1. PPE: 1차 판정 완료 (NOK면 2차까지 완료 + NOK로 확정됐다면 Gap 내용도 작성되어야 함)
  const ppeR = finalResultOf(DRAFT.ppe);
  const ppeDone = ppeR !== null && ppeR !== 'PENDING' && (ppeR !== 'NOK' || gapFilled(DRAFT.ppe.gap));

  // 2. Work Sequence: 모든 체크항목이 최종 판정까지 완료 + NOK 항목은 Gap 내용도 작성되어야 함
  const wsDone = DRAFT.workSequence.items.every(it => {
    const r = finalResultOf(it);
    if(r === null || r === 'PENDING') return false;
    return r !== 'NOK' || gapFilled(it.gap);
  });

  // 3. Key Point (필수): Auditor가 등록한 Key Point가 최소 1개 이상 있고, 모든 Cycle을 판정 + NOK가 있으면 Gap 내용도 작성되어야 함
  const kpItems = DRAFT.keyPoint.items;
  const kpDone = kpItems.length > 0 && kpItems.every(it => {
    const allJudged = DRAFT.keyPoint.cycles.every(c => it.results[c] !== null && it.results[c] !== undefined);
    if(!allJudged) return false;
    const hasNok = DRAFT.keyPoint.cycles.some(c => it.results[c] === 'NOK');
    return !hasNok || gapFilled(it.gap);
  });

  // 4. Standard Time: 표준시간 값 입력 + FAIL 판정이면 Gap 내용도 작성되어야 함
  const stHasValue = DRAFT.standardTime.standardTimeSec !== null && DRAFT.standardTime.standardTimeSec !== undefined;
  const stOverall = computeStandardTimeOverall(DRAFT.standardTime);
  const stDone = stHasValue && (stOverall === 'PASS' || (stOverall === 'FAIL' && gapFilled(DRAFT.standardTime.gap)));

  // 5. Improvement: 작성 여부를 먼저 결정해야 함(결정 전엔 미완료=주황).
  //    "작성 안함" 선택 시 바로 완료 처리, "작성하기" 선택 시 최소 1개 이상 + Idea가 채워져야 완료.
  const impDecision = DRAFT.improvementDecision;
  const impDone = impDecision === 'skip'
    ? true
    : impDecision === 'write'
      ? DRAFT.improvements.length > 0 && DRAFT.improvements.every(im => im.idea && im.idea.trim())
      : false;

  // 6. 검토·제출: 지금 제출해도 검증을 통과하는 상태인지 (validateSubmit 재사용)
  const reviewDone = validateSubmit().length === 0;

  // 진행 표시는 순서대로(1→2→3→4→5→6) 계산 - 앞 단계가 끝나야 다음 단계가 활성화됨
  return [ppeDone, wsDone, kpDone, stDone, impDone, reviewDone];
}

function renderEvaluateForm(){
  const sectionDone = computeSectionDone();
  document.getElementById('app').innerHTML = `
    ${topbar(`${esc(DRAFT.id)} · ${esc(locationLabel())}`, sectionDone, null, '#/audits')}
    <div class="container">
      ${sectionPPE()}
      ${sectionWorkSequence()}
      ${sectionKeyPoint()}
      ${sectionStandardTime()}
      ${sectionImprovement()}
      ${sectionReview()}
    </div>
    <div class="bottom-bar"><div class="bottom-bar-inner">
      <button class="btn btn-secondary" style="flex:1" onclick="saveDraftInline()">Draft 저장</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitAudit(this)">Submit 제출</button>
    </div></div>
  `;
}

/* ---- 공통: 1차/2차 판정 + 코칭 컴포넌트 ---- */
function roundToggle(fieldPath, roundKey, value, currentValue){
  const active = currentValue === value ? 'active' : '';
  return `<button type="button" class="toggle-btn ${value==='OK'?'ok':'nok'} ${active}"
    onclick="setRound('${fieldPath}','${roundKey}','${value}')">${value}</button>`;
}
function getByPath(path){
  const parts = path.split('.');
  let obj = DRAFT;
  for(const p of parts){
    const m = p.match(/^(\w+)\[(\d+)\]$/);
    if(m){ obj = obj[m[1]][parseInt(m[2])]; } else { obj = obj[p]; }
  }
  return obj;
}
function setRound(fieldPath, roundKey, value){
  const obj = getByPath(fieldPath);
  obj[roundKey] = obj[roundKey] === value ? null : value;
  if(roundKey==='round1' && obj.round1==='OK'){ obj.round2=null; obj.coachingNote=''; obj.gap=null; }
  renderEvaluateForm();
}
function finalResultOf(obj){
  if(obj.round1===null || obj.round1===undefined) return null;
  if(obj.round1==='OK') return 'OK';
  if(obj.round2===null || obj.round2===undefined) return 'PENDING';
  return obj.round2;
}

function checkItemBlock(fieldPath, label){
  const obj = getByPath(fieldPath);
  const final = finalResultOf(obj);
  let html = `
    <div class="field">
      <label>${esc(label)}</label>
      <div class="toggle-group">
        ${roundToggle(fieldPath,'round1','OK',obj.round1)}
        ${roundToggle(fieldPath,'round1','NOK',obj.round1)}
      </div>
    </div>`;
  if(obj.round1==='NOK'){
    html += `
    <div class="coach-box">
      <div class="coach-label">💬 즉시 코칭 (Immediate Coaching)</div>
      <textarea placeholder="현장에서 확인/코칭한 내용을 입력하세요" oninput="getByPath('${fieldPath}').coachingNote=this.value">${esc(obj.coachingNote)}</textarea>
      <div class="field" style="margin-top:10px;margin-bottom:0;">
        <label>2차 확인 (코칭 후 재확인)</label>
        <div class="toggle-group">
          ${roundToggle(fieldPath,'round2','OK',obj.round2)}
          ${roundToggle(fieldPath,'round2','NOK',obj.round2)}
        </div>
      </div>
    </div>`;
  }
  if(final==='NOK'){
    html += gapBox(fieldPath, obj, label);
  } else {
    obj.gap = null;
  }
  return html;
}

/* ---- Gap 인라인 폼 ---- */

    obj.gap = {
      tempId: uid('gap'), category: 'Standard Not Followed', description:'', standardRequirement:'',
      immediateAction: obj.coachingNote || '', rootCause:'', riskLevel:'Medium', followUpRequired:true,
      isRepeat:false, repeatOfGapId:null, repeatOfGapLabel:null, evidence:[],
    };
  }
  const g = obj.gap;
  return `
  <div class="gap-box">
    <div class="gap-title">⚠ Gap 등록 — ${esc(sourceLabel)}</div>
    <div class="row2">
      <div class="field" style="margin-bottom:8px;">
        <label>Gap Category</label>
        <select onchange="getByPath('${fieldPath}').gap.category=this.value">
          ${GAP_CATEGORIES.map(c=>`<option value="${c}" ${g.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Risk Level</label>
        <select onchange="getByPath('${fieldPath}').gap.riskLevel=this.value">
          ${RISK_LEVELS.map(r=>`<option value="${r}" ${g.riskLevel===r?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:8px;"><label>Gap Description</label>
      <textarea oninput="getByPath('${fieldPath}').gap.description=this.value" onblur="renderEvaluateForm()" placeholder="실제 관찰된 불일치 내용">${esc(g.description)}</textarea></div>
    <div class="field" style="margin-bottom:8px;"><label>Standard Requirement</label>
      <textarea oninput="getByPath('${fieldPath}').gap.standardRequirement=this.value" onblur="renderEvaluateForm()" placeholder="표준에서 요구하는 내용">${esc(g.standardRequirement)}</textarea></div>
    <div class="field" style="margin-bottom:8px;"><label>Immediate Action</label>
      <textarea oninput="getByPath('${fieldPath}').gap.immediateAction=this.value">${esc(g.immediateAction)}</textarea></div>
    <div class="field" style="margin-bottom:8px;"><label>Root Cause</label>
      <textarea oninput="getByPath('${fieldPath}').gap.rootCause=this.value" placeholder="원인 분석 (선택)">${esc(g.rootCause)}</textarea></div>
    <div class="field" style="margin-bottom:8px;">
      <label>Follow-up 필요 여부</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn ok ${g.followUpRequired?'active':''}" onclick="getByPath('${fieldPath}').gap.followUpRequired=true; renderEvaluateForm();">예</button>
        <button type="button" class="toggle-btn nok ${!g.followUpRequired?'active':''}" onclick="getByPath('${fieldPath}').gap.followUpRequired=false; renderEvaluateForm();">아니오</button>
      </div>
    </div>

    <button type="button" class="btn btn-outline btn-sm" onclick="searchRepeatGap('${fieldPath}')">🔍 유사 과거 Gap 검색</button>
    <div id="repeat-result-${g.tempId}"></div>
    ${g.isRepeat ? `<div class="repeat-box">🔁 <b>${esc(g.repeatOfGapLabel||g.repeatOfGapId)}</b>와 연결됨 <button class="btn btn-sm btn-secondary" onclick="getByPath('${fieldPath}').gap.isRepeat=false; getByPath('${fieldPath}').gap.repeatOfGapId=null; renderEvaluateForm();">해제</button></div>` : ''}

    <div class="field" style="margin:10px 0 0;"><label>📷 Evidence</label>
      <div class="evidence-grid" id="ev-${g.tempId}">
        ${g.evidence.map((e,i)=>`<div class="evidence-thumb"><img src="${e.photoUrl}"><button class="rm" onclick="removeEvidence('${fieldPath}',${i})">×</button></div>`).join('')}
        <label class="evidence-add">+<input type="file" accept="image/*" style="display:none" onchange="addEvidence(event,'${fieldPath}')"></label>
      </div>
    </div>
  </div>`;
}
async function addEvidence(e, fieldPath){
  const file = e.target.files[0]; if(!file) return;
  const dataUrl = await compressImage(file);
  const obj = getByPath(fieldPath);
  const list = obj.gap ? obj.gap.evidence : obj.evidence;
  list.push({photoUrl:dataUrl, beforeAfter:'N-A', description:''});
  renderEvaluateForm();
}
function removeEvidence(fieldPath, idx){
  const obj = getByPath(fieldPath);
  const list = obj.gap ? obj.gap.evidence : obj.evidence;
  list.splice(idx,1);
  renderEvaluateForm();
}
async function searchRepeatGap(fieldPath){
  const obj = getByPath(fieldPath);
  const g = obj.gap;
  const resultDiv = document.getElementById('repeat-result-'+g.tempId);
  resultDiv.innerHTML = `<div class="hint">검색 중...</div>`;
  const ids = (await sGet('index:gaps', true)) || [];
  const gaps = (await Promise.all(ids.map(id=>sGet('gap:'+id, true)))).filter(Boolean);
  const matches = gaps.filter(x => x.stationId===DRAFT.stationId && x.category===g.category)
    .sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,3);
  if(matches.length===0){ resultDiv.innerHTML = `<div class="hint">유사한 과거 Gap이 없습니다.</div>`; return; }
  resultDiv.innerHTML = `<div class="repeat-box">` + matches.map(m => `
    <div class="repeat-item">
      <span>${esc(m.id)} · ${esc((m.createdAt||'').slice(0,10))} · ${esc((m.description||'').slice(0,20))}</span>
      <button class="btn btn-sm btn-outline" onclick="linkRepeatGap('${fieldPath}','${m.id}')">연결</button>
    </div>`).join('') + `</div>`;
}
function linkRepeatGap(fieldPath, gapId){
  const obj = getByPath(fieldPath);
  obj.gap.isRepeat = true;
  obj.gap.repeatOfGapId = gapId;
  obj.gap.repeatOfGapLabel = gapId;
  renderEvaluateForm();
}

/* ---- ③ Key Point ---- */
function sectionKeyPoint(){
  const kp = DRAFT.keyPoint;
  let table = `<table class="kp-table"><thead><tr><th style="text-align:left">Key Point</th><th>출처</th>
    ${kp.cycles.map(c=>{
      if(KP_CYCLE_DELETE_CONFIRM === c){
        return `<th>Cycle ${c}<div class="del-confirm" style="justify-content:center; margin-top:4px;">
          <button type="button" class="btn btn-sm btn-danger-outline" onclick="removeKpCycle(${c})">삭제</button>
          <button type="button" class="btn btn-sm btn-secondary" onclick="KP_CYCLE_DELETE_CONFIRM=null; renderEvaluateForm();">취소</button>
        </div></th>`;
      }
      const delBtn = kp.cycles.length > 1 ? `<button type="button" class="row-del-btn" style="font-size:10px; padding:2px;" onclick="KP_CYCLE_DELETE_CONFIRM=${c}; renderEvaluateForm();" title="Cycle 삭제">🗑</button>` : '';
      return `<th>Cycle ${c} ${delBtn}</th>`;
    }).join('')}<th></th></tr></thead><tbody>`;
  kp.items.forEach((it, i) => {
    const hasNok = kp.cycles.some(c => it.results[c]==='NOK');
    table += `<tr class="${hasNok?'kp-row-nok':''}">
      <td class="kp-text">${esc(it.text)}</td>
      <td>${it.source}</td>
      ${kp.cycles.map(c=>{
        const v = it.results[c];
        const cls = v==='OK'?'ok':v==='NOK'?'nok':'empty';
        const label = v==='OK'?'OK':v==='NOK'?'NOK':'-';
        return `<td class="kp-cell ${cls}" onclick="cycleKpToggle(${i},${c})">${label}</td>`;
      }).join('')}
      <td><button class="btn btn-sm btn-secondary" onclick="removeKpRow(${i})">삭제</button></td>
    </tr>`;
    if(hasNok){
      table += `<tr class="kp-row-nok"><td colspan="${3+kp.cycles.length}">${gapBox(`keyPoint.items[${i}]`, it, it.text)}</td></tr>`;
    }
  });
  table += `</tbody></table>`;

  return `<div class="card">
    <div class="section-title"><span class="section-num">3</span> Key Point Audit <span class="req">*</span></div>
    <div class="section-goal">목표: 감사 대상 Key Point가 모든 관찰 Cycle에서 준수되는지 확인 (Auditor가 평가 항목을 직접 등록, 최소 1개 이상 필수)</div>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
      <input type="text" id="kp-new-text" placeholder="Key Point 내용 입력">
      <select id="kp-new-source" style="width:110px;"><option value="SWI">SWI</option><option value="OPL">OPL</option></select>
      <button class="btn btn-sm btn-primary" onclick="addKpRow()">+ 추가</button>
    </div>
    ${kp.items.length ? table : '<div class="hint">등록된 Key Point가 없습니다. 최소 1개 이상 등록해야 제출할 수 있습니다.</div>'}
    <button class="btn btn-sm btn-outline" style="margin-top:10px;" onclick="addKpCycle()">+ Cycle 추가</button>
    <div class="field" style="margin-top:12px;"><label>Observation</label>
      <textarea oninput="DRAFT.keyPoint.observation=this.value">${esc(kp.observation)}</textarea></div>
  </div>`;
}
function addKpRow(){
  const text = document.getElementById('kp-new-text').value.trim();
  const source = document.getElementById('kp-new-source').value;
  if(!text){ toast('Key Point 내용을 입력하세요.', 'error'); return; }
  const results = {}; DRAFT.keyPoint.cycles.forEach(c => results[c]=null);
  DRAFT.keyPoint.items.push({id:uid('kp'), text, source, results, gap:null});
  renderEvaluateForm();
}
function removeKpRow(i){ DRAFT.keyPoint.items.splice(i,1); renderEvaluateForm(); }
function addKpCycle(){
  const next = Math.max(0,...DRAFT.keyPoint.cycles)+1;
  DRAFT.keyPoint.cycles.push(next);
  DRAFT.keyPoint.items.forEach(it => it.results[next]=null);
  renderEvaluateForm();
}
let KP_CYCLE_DELETE_CONFIRM = null;
function removeKpCycle(c){
  if(DRAFT.keyPoint.cycles.length <= 1){
    toast('최소 1개의 Cycle은 있어야 합니다.', 'error');
    KP_CYCLE_DELETE_CONFIRM = null;
    renderEvaluateForm();
    return;
  }
  DRAFT.keyPoint.cycles = DRAFT.keyPoint.cycles.filter(x => x !== c);
  DRAFT.keyPoint.items.forEach(it => { delete it.results[c]; });
  KP_CYCLE_DELETE_CONFIRM = null;
  renderEvaluateForm();
}
function cycleKpToggle(i, c){
  const it = DRAFT.keyPoint.items[i];
  const cur = it.results[c];
  it.results[c] = cur===null||cur===undefined ? 'OK' : cur==='OK' ? 'NOK' : null;
  renderEvaluateForm();
}

/* ---- ④ Standard Time ---- */
// 표준시간 판정을 순수 함수로 분리 - 등록된 모든 Cycle에 측정값이 입력되기 전까지는 판정을 보류(null)한다.
// (측정 안 한 Cycle을 실패로 취급해서 값 입력 즉시 FAIL이 뜨는 것을 방지)
function computeStandardTimeOverall(st){
  if(!st.standardTimeSec) return null;
  if(st.cycles.length < st.minCycles) return null; // 등록된 Cycle 수가 최소 기준보다 적으면 애초에 판정 불가 (판정 보류)
  const allMeasured = st.cycles.length > 0 && st.cycles.every(c => c.measured !== null && c.measured !== undefined);
  if(!allMeasured) return null;
  const tol = st.tolerancePct/100;
  const lo = st.standardTimeSec*(1-tol), hi = st.standardTimeSec*(1+tol);
  const okCount = st.cycles.filter(c => c.measured>=lo && c.measured<=hi).length;
  return okCount >= st.minCycles ? 'PASS' : 'FAIL';
}

function sectionStandardTime(){
  const st = DRAFT.standardTime;
  const tol = st.tolerancePct/100;
  let okCount = 0;
  const rows = st.cycles.map((c,i) => {
    let result = '-';
    if(st.standardTimeSec && c.measured!=null){
      const lo = st.standardTimeSec*(1-tol), hi = st.standardTimeSec*(1+tol);
      const pass = c.measured>=lo && c.measured<=hi;
      if(pass) okCount++;
      result = pass ? '✅ OK' : '❌ NOK';
    }
    return `<tr>
      <td>Cycle ${c.cycleNo}</td>
      <td><input type="number" value="${c.measured??''}" onchange="setStCycleMeasured(${i}, this.value)" style="width:80px;"></td>
      <td>${result}</td>
      <td>${st.cycles.length>1 ? `<button type="button" class="btn btn-sm btn-secondary" onclick="removeStCycle(${i})">삭제</button>` : ''}</td>
    </tr>`;
  }).join('');

  const overall = computeStandardTimeOverall(st);
  st.overallResult = overall;
  if(overall==='FAIL'){
    if(!st.gap){
      st.gap = {tempId:uid('gap'), category:'Standard Not Followed', description:`표준시간 ${st.standardTimeSec}초(±${st.tolerancePct}%) 대비 기준 미충족 (${okCount}/${st.cycles.length} Cycle Pass, 최소 ${st.minCycles} 필요)`,
        standardRequirement:'', immediateAction:'', rootCause:'', riskLevel:'Medium', followUpRequired:true,
        isRepeat:false, repeatOfGapId:null, repeatOfGapLabel:null, evidence:[]};
    }
  } else { st.gap = null; }

  return `<div class="card">
    <div class="section-title"><span class="section-num">4</span> Standard Time Audit</div>
    <div class="section-goal">목표: 작업자가 정의된 표준시간 내에 작업을 완료하는지 확인</div>
    <div class="row3">
      <div class="field"><label>Standard Time (초)</label><input type="number" value="${st.standardTimeSec??''}" onchange="DRAFT.standardTime.standardTimeSec=this.value?Number(this.value):null; renderEvaluateForm();"></div>
      <div class="field"><label>Tolerance (%)</label><input type="number" value="${st.tolerancePct}" onchange="DRAFT.standardTime.tolerancePct=Number(this.value)||0; renderEvaluateForm();"></div>
      <div class="field"><label>최소 Cycle 수</label><input type="number" value="${st.minCycles}" onchange="DRAFT.standardTime.minCycles=Number(this.value)||1; renderEvaluateForm();"></div>
    </div>
    <table class="kp-table"><thead><tr><th>Cycle</th><th>측정시간(초)</th><th>판정</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>
    <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="addStCycle()">+ Cycle 추가</button>
    ${overall ? `<div style="margin-top:10px; font-weight:800; color:${overall==='PASS'?'var(--success)':'var(--danger)'}">종합 판정: ${okCount}/${st.cycles.length} Cycle OK (최소 ${st.minCycles}) → ${overall==='PASS'?'✅ PASS':'❌ FAIL'}</div>`
      : st.standardTimeSec && st.cycles.length < st.minCycles ? `<div class="hint" style="color:var(--warning); font-weight:700;">⚠ 현재 등록된 Cycle 수(${st.cycles.length})가 최소 Cycle 수(${st.minCycles})보다 적어 판정할 수 없습니다. Cycle을 추가하거나 최소 Cycle 수를 조정해주세요.</div>`
      : `<div class="hint">${st.standardTimeSec ? '등록된 모든 Cycle의 측정시간을 입력하면 자동 판정됩니다.' : 'Standard Time을 입력하면 자동 판정됩니다.'}</div>`}
    ${overall==='FAIL' ? gapBox('standardTime', st, 'Standard Time') : ''}
    <div class="field" style="margin-top:10px;"><label>변동성(Variability) 코멘트 (선택)</label>
      <textarea oninput="DRAFT.standardTime.variabilityComment=this.value">${esc(st.variabilityComment)}</textarea></div>
  </div>`;
}
function setStCycleMeasured(i, v){ DRAFT.standardTime.cycles[i].measured = v?Number(v):null; renderEvaluateForm(); }
function addStCycle(){
  const next = Math.max(0,...DRAFT.standardTime.cycles.map(c=>c.cycleNo))+1;
  DRAFT.standardTime.cycles.push({cycleNo:next, measured:null});
  renderEvaluateForm();
}
function removeStCycle(i){
  if(DRAFT.standardTime.cycles.length <= 1){
    toast('최소 1개의 Cycle은 있어야 합니다.', 'error');
    return;
  }
  DRAFT.standardTime.cycles.splice(i, 1);
  renderEvaluateForm();
}

/* ---- ⑤ Improvement ---- */

      <div class="field"><label>Improvement Idea</label><textarea oninput="DRAFT.improvements[${i}].idea=this.value" onblur="renderEvaluateForm()">${esc(im.idea)}</textarea></div>
      <div class="field"><label>Benefit</label><textarea oninput="DRAFT.improvements[${i}].benefit=this.value" placeholder="표준시간 단축 여부 등">${esc(im.benefit)}</textarea></div>
      <div class="row2">

  const decisionBlock = `

      <label>이 감사에서 개선 아이디어를 작성하시겠습니까? <span class="req">*</span></label>
      <div class="toggle-group">

function setImprovementDecision(v){
  DRAFT.improvementDecision = v;
  renderEvaluateForm();
}
function addImprovement(){
  DRAFT.improvements.push({id:uid('imp'), observation:'', idea:'', benefit:'', ownerId:'', targetDate:'', evidence:[]});
  renderEvaluateForm();
}
function removeImprovement(i){ DRAFT.improvements.splice(i,1); renderEvaluateForm(); }
async function addImpEvidence(e, i){
  const file = e.target.files[0]; if(!file) return;
  const dataUrl = await compressImage(file);
  DRAFT.improvements[i].evidence.push({photoUrl:dataUrl, beforeAfter:'N-A', description:''});

}
function removeImpEvidence(i, ei){ DRAFT.improvements[i].evidence.splice(ei,1); renderEvaluateForm(); }

/* ---- ⑥ 검토 및 제출 ---- */
function collectAllGaps(){
  const gaps = [];
  if(finalResultOf(DRAFT.ppe)==='NOK' && DRAFT.ppe.gap) gaps.push({source:'PPE', label:'PPE 준수', gap:DRAFT.ppe.gap});
  DRAFT.workSequence.items.forEach(it => { if(finalResultOf(it)==='NOK' && it.gap) gaps.push({source:'Work Sequence', label:it.label, gap:it.gap}); });
  DRAFT.keyPoint.items.forEach(it => {
    const hasNok = DRAFT.keyPoint.cycles.some(c => it.results[c]==='NOK');
    if(hasNok && it.gap) gaps.push({source:'Key Point', label:it.text, gap:it.gap});
  });
  if(DRAFT.standardTime.overallResult==='FAIL' && DRAFT.standardTime.gap) gaps.push({source:'Standard Time', label:'표준시간 준수', gap:DRAFT.standardTime.gap});
  return gaps;
}
function sectionReview(){
  const ppeFinal = finalResultOf(DRAFT.ppe);
  const wsResults = DRAFT.workSequence.items.map(finalResultOf);
  const wsFinal = wsResults.every(r=>r==='OK') ? 'OK' : (wsResults.some(r=>r==='NOK') ? 'NOK' : (wsResults.some(r=>r==='PENDING')?'PENDING':null));
  const kpFinal = DRAFT.keyPoint.items.length===0 ? 'N-A' : (DRAFT.keyPoint.items.some(it=>DRAFT.keyPoint.cycles.some(c=>it.results[c]==='NOK')) ? 'NOK' : 'OK');
  const stFinal = DRAFT.standardTime.overallResult || 'PENDING';
  const gaps = collectAllGaps();

  const overall = [ppeFinal, wsFinal, kpFinal==='N-A'?'OK':kpFinal, stFinal==='PASS'?'OK':stFinal==='FAIL'?'NOK':stFinal]
    .every(r=>r==='OK') ? 'OK' : 'NOK';
  DRAFT.overallResult = overall;

  return `<div class="card">
    <div class="section-title"><span class="section-num">6</span> 검토 및 제출</div>
    <table class="summary-table">
      <tr><td>PPE</td><td>${resultBadgeSmall(ppeFinal)}</td></tr>
      <tr><td>Work Sequence</td><td>${resultBadgeSmall(wsFinal)}</td></tr>
      <tr><td>Key Point</td><td>${resultBadgeSmall(kpFinal)}</td></tr>
      <tr><td>Standard Time</td><td>${stFinal==='PENDING'?'<span class="badge badge-neutral">미입력</span>':resultBadgeSmall(stFinal==='PASS'?'OK':'NOK')}</td></tr>
      <tr><td>Improvement</td><td>${DRAFT.improvements.length}건 등록</td></tr>
    </table>
    <div class="divider"></div>
    <div class="flex-between"><b>종합 결과</b> ${resultBadgeSmall(overall)}</div>
    ${gaps.length ? `<div style="margin-top:10px;"><b style="font-size:12.5px;">생성된 Gap 목록 (${gaps.length}건)</b>
      ${gaps.map(g => `<div class="gap-preview" ${g.gap.finalGapId?`onclick="location.hash='#/gaps/${esc(g.gap.finalGapId)}'"`:''}><span>${g.gap.finalGapId?esc(g.gap.finalGapId)+' · ':''}[${g.source}] ${esc(g.label)}</span><span class="badge badge-${g.gap.riskLevel.toLowerCase()}">${g.gap.riskLevel}</span></div>`).join('')}
      </div>` : ''}
  </div>`;
}
function resultBadgeSmall(r){
  if(r==='OK') return '<span class="badge badge-ok">OK</span>';
  if(r==='NOK') return '<span class="badge badge-nok">NOK</span>';
  if(r==='PENDING') return '<span class="badge badge-medium">2차 확인 대기</span>';
  return '<span class="badge badge-neutral">-</span>';
}

/* ---- Submit ---- */
function validateSubmit(){
  const errs = [];
  if(DRAFT.ppe.round1===null) errs.push('PPE Audit 판정이 필요합니다.');
  if(DRAFT.ppe.round1==='NOK' && DRAFT.ppe.round2===null) errs.push('PPE Audit 2차 확인이 필요합니다.');
  DRAFT.workSequence.items.forEach(it=>{
    if(it.round1===null) errs.push(`Work Sequence "${it.label}" 판정이 필요합니다.`);
    if(it.round1==='NOK' && it.round2===null) errs.push(`Work Sequence "${it.label}" 2차 확인이 필요합니다.`);
  });
  if(DRAFT.keyPoint.items.length===0){
    errs.push('Key Point Audit 항목을 최소 1개 이상 등록해주세요.');
  } else {
    DRAFT.keyPoint.items.forEach(it=>{
      const missing = DRAFT.keyPoint.cycles.some(c => it.results[c]===null || it.results[c]===undefined);
      if(missing) errs.push(`Key Point "${it.text}" 의 모든 Cycle 판정이 필요합니다.`);
    });
  }
  if(!DRAFT.standardTime.standardTimeSec){
    errs.push('Standard Time 값을 입력해주세요.');
  } else {
    const stOverall = computeStandardTimeOverall(DRAFT.standardTime);
    if(stOverall === null){
      if(DRAFT.standardTime.cycles.length < DRAFT.standardTime.minCycles){
        errs.push(`Standard Time: 등록된 Cycle 수가 최소 Cycle 수(${DRAFT.standardTime.minCycles})보다 적습니다.`);
      } else {
        errs.push('Standard Time: 등록된 모든 Cycle의 측정시간을 입력해주세요.');
      }
    }
  }

  if(!DRAFT.improvementDecision){
    errs.push('Improvement 작성 여부를 선택해주세요 (작성함/작성 안함).');
  } else if(DRAFT.improvementDecision === 'write' && (DRAFT.improvements.length===0 || DRAFT.improvements.some(im => !im.idea || !im.idea.trim()))){
    errs.push('Improvement Idea를 입력해주세요.');
  }

  // NOK/FAIL로 생성된 모든 Gap이 실제로 작성됐는지 확인 (Description/Standard Requirement 필수)
  collectAllGaps().forEach(g => {
    if(!gapFilled(g.gap)){
      errs.push(`[${g.source}] "${g.label}" Gap의 Description/Standard Requirement를 입력해주세요.`);
    }
  });

  return errs;
}
let AUDIT_SUBMITTING = false;
async function createActionsFromImprovements(audit){
  if(!audit.improvements || audit.improvements.length===0) return;
  const eligible = audit.improvements.filter(im => im.ownerId && im.targetDate);
  if(eligible.length===0) return;
  const actionIndex = (await sGet('index:actions', true)) || [];
  for(const im of eligible){
    const owner = MASTER.operators.find(o=>o.id===im.ownerId);
    const actionId = await nextActionId();
    const record = {
      id: actionId, gapId: null, sourceType: 'improvement', auditId: audit.id, improvementId: im.id,
      actionType: 'Improvement 실행', description: im.idea || im.observation || '(개선 아이디어)',
      ownerName: owner ? owner.name : '', dueDate: im.targetDate,
      status: 'Not Started', completedAt: null, completionNotes: '', completionEvidence: [],
      effectivenessEval: '', effectivenessComment: '', reauditNeeded: null,
      createdAt: new Date().toISOString(),
    };
    await sSet('action:'+actionId, record, true);
    actionIndex.push(actionId);
  }
  await sSet('index:actions', actionIndex, true);
}

async function submitAudit(btn){
  if(AUDIT_SUBMITTING) return;
  const errs = validateSubmit();
  if(errs.length){ toast('제출 전 확인이 필요합니다:\n' + errs.slice(0,4).join('\n') + (errs.length>4?'\n...외 '+(errs.length-4)+'건':''), 'error'); return; }

  AUDIT_SUBMITTING = true;
  if(btn){ btn.disabled = true; btn.textContent = '제출 중...'; }

  const gaps = collectAllGaps();
  const gapIndex = (await sGet('index:gaps', true)) || [];
  for(const g of gaps){
    const gapId = await nextGapId();
    const record = {
      id: gapId, auditId: DRAFT.id, sourceSection: g.source, sourceLabel: g.label,
      category: g.gap.category, description: g.gap.description, standardRequirement: g.gap.standardRequirement,
      immediateAction: g.gap.immediateAction, rootCause: g.gap.rootCause, riskLevel: g.gap.riskLevel,
      followUpRequired: g.gap.followUpRequired, status:'Open',
      isRepeat: g.gap.isRepeat, repeatOfGapId: g.gap.repeatOfGapId,
      evidence: g.gap.evidence,
      regionId: DRAFT.regionId, siteId: DRAFT.siteId, areaId: DRAFT.areaId, lineId: DRAFT.lineId, stationId: DRAFT.stationId,
      createdAt: new Date().toISOString(),
    };
    await sSet('gap:'+gapId, record, true);
    gapIndex.push(gapId);
    g.gap.finalGapId = gapId;
  }
  await sSet('index:gaps', gapIndex, true);

  await createActionsFromImprovements(DRAFT);

  DRAFT.status = 'Submitted';
  DRAFT.submittedAt = new Date().toISOString();
  await sSet('audit:'+DRAFT.id, DRAFT, true);
  const idx = (await sGet('index:audits', true)) || [];
  if(!idx.includes(DRAFT.id)){ idx.push(DRAFT.id); await sSet('index:audits', idx, true); }

  location.hash = '#/audits/'+DRAFT.id+'/done';
}

/* ============================= 제출된 Audit 전체 상세 보기 ============================= */
function renderAuditDetailFull(audit, improvementActions){
  improvementActions = improvementActions || [];
  // ① PPE
  const ppeFinal = finalResultOfSafe(audit.ppe);
  const ppeCard = `<div class="card">
    <div class="section-title" style="margin-bottom:8px;"><span class="section-num">1</span> PPE Audit</div>
    <div class="kv-row"><span class="k">판정</span><span class="v">${resultBadgeSmall(ppeFinal)}</span></div>
    ${audit.ppe.round1==='NOK' ? `<div class="kv-row"><span class="k">즉시 코칭 내용</span><span class="v">${esc(audit.ppe.coachingNote||'-')}</span></div>` : ''}
    ${audit.ppe.observation ? `<div class="kv-row"><span class="k">Observation</span><span class="v">${esc(audit.ppe.observation)}</span></div>` : ''}
  </div>`;

  // ② Work Sequence
  const wsRows = audit.workSequence.items.map(it => {
    const r = finalResultOfSafe(it);
    return `<div class="kv-row"><span class="k">${esc(it.label)}</span><span class="v">${resultBadgeSmall(r)}</span></div>
      ${it.round1==='NOK' ? `<div class="hint" style="margin:-4px 0 8px;">💬 코칭: ${esc(it.coachingNote||'-')}</div>` : ''}`;
  }).join('');
  const wsCard = `<div class="card">
    <div class="section-title" style="margin-bottom:8px;"><span class="section-num">2</span> Work Sequence Audit</div>
    ${wsRows}
    ${audit.workSequence.observation ? `<div class="kv-row"><span class="k">Observation</span><span class="v">${esc(audit.workSequence.observation)}</span></div>` : ''}
  </div>`;

  // ③ Key Point
  let kpBody;
  if(audit.keyPoint.items.length){
    let kpTable = `<table class="kp-table"><thead><tr><th style="text-align:left">Key Point</th><th>출처</th>${audit.keyPoint.cycles.map(c=>`<th>Cycle ${c}</th>`).join('')}</tr></thead><tbody>`;
    audit.keyPoint.items.forEach(it => {
      const hasNok = audit.keyPoint.cycles.some(c => it.results[c]==='NOK');
      kpTable += `<tr class="${hasNok?'kp-row-nok':''}"><td class="kp-text">${esc(it.text)}</td><td>${esc(it.source)}</td>
        ${audit.keyPoint.cycles.map(c=>{
          const v = it.results[c]; const cls = v==='OK'?'ok':v==='NOK'?'nok':'empty'; const label = v==='OK'?'OK':v==='NOK'?'NOK':'-';
          return `<td class="kp-cell ${cls}">${label}</td>`;
        }).join('')}
      </tr>`;
    });
    kpTable += `</tbody></table>`;
    kpBody = kpTable;
  } else {
    kpBody = '<div class="hint">등록된 Key Point가 없습니다.</div>';
  }
  const kpCard = `<div class="card">
    <div class="section-title" style="margin-bottom:8px;"><span class="section-num">3</span> Key Point Audit</div>
    ${kpBody}
    ${audit.keyPoint.observation ? `<div class="kv-row" style="margin-top:8px;"><span class="k">Observation</span><span class="v">${esc(audit.keyPoint.observation)}</span></div>` : ''}
  </div>`;

  // ④ Standard Time
  const st = audit.standardTime;
  const tol = st.tolerancePct/100;
  const stRows = st.cycles.map(c => {
    let result = '-';
    if(st.standardTimeSec && c.measured!=null){
      const lo = st.standardTimeSec*(1-tol), hi = st.standardTimeSec*(1+tol);
      result = (c.measured>=lo && c.measured<=hi) ? '✅ OK' : '❌ NOK';
    }
    return `<tr><td>Cycle ${c.cycleNo}</td><td>${c.measured??'-'}</td><td>${result}</td></tr>`;
  }).join('');
  const stCard = `<div class="card">
    <div class="section-title" style="margin-bottom:8px;"><span class="section-num">4</span> Standard Time Audit</div>
    <div class="kv-row"><span class="k">기준</span><span class="v">${st.standardTimeSec??'-'}초 (±${st.tolerancePct}%, 최소 ${st.minCycles} Cycle Pass)</span></div>
    <table class="kp-table" style="margin-top:8px;"><thead><tr><th>Cycle</th><th>측정시간(초)</th><th>판정</th></tr></thead><tbody>${stRows}</tbody></table>
    <div class="kv-row" style="margin-top:8px;"><span class="k">종합 판정</span><span class="v">${st.overallResult ? resultBadgeSmall(st.overallResult==='PASS'?'OK':'NOK') : '-'}</span></div>
    ${st.variabilityComment ? `<div class="kv-row"><span class="k">변동성 코멘트</span><span class="v">${esc(st.variabilityComment)}</span></div>` : ''}
  </div>`;

  // ⑤ Improvement
  let impBody;
  if(audit.improvementDecision === 'skip'){
    impBody = '<div class="hint">이 감사에서는 개선 아이디어를 작성하지 않기로 선택했습니다.</div>';
  } else if(audit.improvements && audit.improvements.length){
    impBody = audit.improvements.map(im => {
      const owner = MASTER.operators.find(o=>o.id===im.ownerId);
      const linkedAction = improvementActions.find(a => a.improvementId === im.id);
      const actionRow = linkedAction
        ? `<div class="kv-row"><span class="k">연결 Action</span><span class="v"><span class="plain" onclick="location.hash='#/actions/${esc(linkedAction.id)}'">${esc(linkedAction.id)}</span> ${actionStatusBadge(linkedAction)}</span></div>`
        : `<div class="hint">Owner/Target Date가 없어 Action이 생성되지 않았습니다.</div>`;
      return `<div class="imp-card" style="cursor:default;">
        ${im.observation ? `<div class="kv-row"><span class="k">Observation</span><span class="v">${esc(im.observation)}</span></div>` : ''}
        <div class="kv-row"><span class="k">Improvement Idea</span><span class="v">${esc(im.idea||'-')}</span></div>
        ${im.benefit ? `<div class="kv-row"><span class="k">Benefit</span><span class="v">${esc(im.benefit)}</span></div>` : ''}
        <div class="kv-row"><span class="k">Owner</span><span class="v">${esc(owner?owner.name:'-')}</span></div>
        <div class="kv-row"><span class="k">Target Date</span><span class="v">${esc(im.targetDate||'-')}</span></div>
        ${im.evidence && im.evidence.length ? `<div class="evidence-grid">${im.evidence.map(e=>`<div class="evidence-thumb"><img src="${e.photoUrl}"></div>`).join('')}</div>` : ''}
        ${actionRow}
      </div>`;
    }).join('');
  } else {
    impBody = '<div class="hint">등록된 개선 아이디어가 없습니다.</div>';
  }
  const impCard = `<div class="card">
    <div class="section-title" style="margin-bottom:8px;"><span class="section-num">5</span> Improvement Opportunity</div>
    ${impBody}
  </div>`;

  return ppeCard + wsCard + kpCard + stCard + impCard;

// 하나의 Audit에서 개별 체크항목 결과(OK/NOK) 배열을 계산 (Compliance Rate 산정용)
function auditItemResults(audit){
  const results = [];
  if(!audit) return results;
  const ppeFinal = finalResultOfSafe(audit.ppe);
  if(ppeFinal && ppeFinal!=='PENDING') results.push(ppeFinal);
  if(audit.workSequence && Array.isArray(audit.workSequence.items)){
    audit.workSequence.items.forEach(it => { const r = finalResultOfSafe(it); if(r && r!=='PENDING') results.push(r); });
  }
  if(audit.keyPoint && Array.isArray(audit.keyPoint.items) && Array.isArray(audit.keyPoint.cycles)){
    audit.keyPoint.items.forEach(it => {
      if(!it || !it.results) return;
      const hasNok = audit.keyPoint.cycles.some(c => it.results[c]==='NOK');
      const hasAny = audit.keyPoint.cycles.some(c => it.results[c]!=null);
      if(hasAny) results.push(hasNok ? 'NOK' : 'OK');
    });
  }
  if(audit.standardTime && audit.standardTime.overallResult) results.push(audit.standardTime.overallResult==='PASS' ? 'OK' : 'NOK');
  return results;
}
function finalResultOfSafe(obj){
  if(!obj || obj.round1===null || obj.round1===undefined) return null;
  if(obj.round1==='OK') return 'OK';
  if(obj.round2===null || obj.round2===undefined) return 'PENDING';
  return obj.round2;
}

function filterByLocation(list, key){
  return list.filter(x => {
    if(DASH_FILTERS.regionId!=='all' && x.regionId!==DASH_FILTERS.regionId) return false;
    if(DASH_FILTERS.siteId!=='all' && x.siteId!==DASH_FILTERS.siteId) return false;
    return true;
  });
}

function renderTrendSvg(points){
  const w = 600, h = 140, pad = 24;
  const stepX = points.length>1 ? (w-pad*2)/(points.length-1) : 0;
  const coords = points.map((p,i) => {
    const x = pad + stepX*i;
    const y = h - pad - (p.rate/100)*(h-pad*2);
    return {x,y,...p};
  });
  const path = coords.map((c,i)=>`${i===0?'M':'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
  const dots = coords.map(c=>`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="4" fill="#005EB8"></circle>
    <text x="${c.x.toFixed(1)}" y="${(c.y-10).toFixed(1)}" font-size="10" fill="#2F425F" text-anchor="middle">${c.rate}%</text>
    <text x="${c.x.toFixed(1)}" y="${h-6}" font-size="9" fill="#6B7684" text-anchor="middle">${c.m.slice(5)}</text>`).join('');
  return `<div class="trend-wrap"><svg viewBox="0 0 ${w} ${h}" style="width:100%; min-width:320px;">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#E1E6ED"/>
    <path d="${path}" fill="none" stroke="#005EB8" stroke-width="2.5"/>
    ${dots}
  </svg></div>`;
}

        const gapRecord = {
          id:gapId, auditId:id,
          sourceSection: p.gapCat==='Safety' ? 'PPE' : (p.gapCat==='Standard Not Followed' ? 'Work Sequence' : 'Key Point'),
          sourceLabel: p.gapCat==='Safety' ? 'PPE 준수' : (p.gapCat==='Standard Not Followed' ? 'SWIP 수량' : '토크 스펙 준수'),
          category:p.gapCat, description:'[샘플] '+p.gapCat+' 관련 불일치가 관찰됨', standardRequirement:'[샘플] 표준 요구사항',
          immediateAction:'현장 즉시 코칭 실시', rootCause:'', riskLevel:p.risk, followUpRequired:true, status:'Open',
          isRepeat:false, repeatOfGapId:null, evidence:[],
          regionId:c.regionId, siteId:c.siteId, areaId:c.areaId, lineId:c.lineId, stationId:c.stationId,
          createdAt: isoDate,
        };

        if(p.withAction==='completed'){
          gapRecord.status='Closed';
          actionSeq += 1;
          const actionId = 'A-'+String(actionSeq).padStart(4,'0');
          const completedIso = new Date(submittedDate.getTime()+5*86400000).toISOString();
          actionRecords.push({
            id:actionId, gapId, actionType:'훈련', description:'[샘플] 현장 재교육 실시',
            ownerName:'박현장', dueDate: new Date(submittedDate.getTime()+7*86400000).toISOString().slice(0,10),
            status:'Completed', completedAt: completedIso, completionNotes:'교육 완료 및 재발방지 조치함',
            completionEvidence:[], effectivenessEval:'효과있음', effectivenessComment:'재발 없음 확인',
            reauditNeeded:false, createdAt: isoDate,
          });
          actionIndex.push(actionId);
        } else if(p.withAction==='overdue'){
          gapRecord.status='In Progress';
          actionSeq += 1;
          const actionId = 'A-'+String(actionSeq).padStart(4,'0');
          actionRecords.push({
            id:actionId, gapId, actionType:'5S/레이아웃 개선', description:'[샘플] 라인 옆 SWIP 표시 재도색 필요',
            ownerName:'김라인', dueDate: new Date(Date.now()-5*86400000).toISOString().slice(0,10),
            status:'In Progress', completedAt:null, completionNotes:'', completionEvidence:[],
            effectivenessEval:'', effectivenessComment:'', reauditNeeded:null, createdAt: isoDate,
          });
          actionIndex.push(actionId);
        }

        gapRecords.push(gapRecord);
        gapIndex.push(gapId);
      }

      auditRecords.push(audit);
      auditIndex.push(id);
    }

    // 2단계: 모든 레코드를 storage에 저장 (진행상황 표시하며 순차 실행)
    let doneCount = 0;
    const totalCount = auditRecords.length + gapRecords.length + actionRecords.length;
    setStep(`Audit/Gap/Action 저장 중 (5/6) - 0/${totalCount}`);
    for(const audit of auditRecords){
      await sSet('audit:'+audit.id, audit, true);
      doneCount++;
      setStep(`Audit/Gap/Action 저장 중 (5/6) - ${doneCount}/${totalCount}`);
    }
    for(const gapRecord of gapRecords){
      await sSet('gap:'+gapRecord.id, gapRecord, true);
      doneCount++;
      setStep(`Audit/Gap/Action 저장 중 (5/6) - ${doneCount}/${totalCount}`);
    }
    for(const actionRecord of actionRecords){
      await sSet('action:'+actionRecord.id, actionRecord, true);
      doneCount++;
      setStep(`Audit/Gap/Action 저장 중 (5/6) - ${doneCount}/${totalCount}`);
    }
  } finally {
    // 여기까지 오는 동안 만들어진 audit/gap/action은 이미 개별 저장되었을 수 있으므로,
    // 성공/실패와 무관하게 인덱스와 카운터는 항상 최신 상태로 반영해 "고아 데이터"가 생기지 않도록 한다.
    setStep('최종 인덱스/카운터 저장 (6/6)');
    if(auditIndex.length){
      const existingAuditIdx = (await sGet('index:audits', true)) || [];
      const mergedAuditIdx = Array.from(new Set([...existingAuditIdx, ...auditIndex]));
      await sSet('index:audits', mergedAuditIdx, true);
    }
    if(gapIndex.length){
      const existingGapIdx = (await sGet('index:gaps', true)) || [];
      const mergedGapIdx = Array.from(new Set([...existingGapIdx, ...gapIndex]));
      await sSet('index:gaps', mergedGapIdx, true);
    }
    if(actionIndex.length){
      const existingActionIdx = (await sGet('index:actions', true)) || [];
      const mergedActionIdx = Array.from(new Set([...existingActionIdx, ...actionIndex]));
      await sSet('index:actions', mergedActionIdx, true);
    }
    if(auditSeq) await sSet('counter:audit:'+ymd, auditSeq, true);
    if(gapSeq) await sSet('counter:gap', gapSeq, true);
    if(actionSeq) await sSet('counter:action', actionSeq, true);
  }

  setStep('대시보드 갱신');
  toast('샘플 Audit 10건이 생성되었습니다.', 'success');
  route();
}

boot();
</script>
</body>
</html>

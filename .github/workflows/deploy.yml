name: Deploy SW Audit Demo to GitHub Pages

# main 브랜치에 뭔가 올라올 때마다 자동으로 실행됩니다.
on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 배포용 폴더 준비 (루트의 html 파일을 자동으로 찾아 index.html로 변환)
        run: |
          mkdir -p site
          shopt -s nullglob
          files=(*.html)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::저장소 루트에 .html 파일이 없습니다. 업로드가 잘 되었는지 확인해주세요."
            exit 1
          fi
          if [ ${#files[@]} -gt 1 ]; then
            echo "::error::저장소 루트에 .html 파일이 ${#files[@]}개 있습니다: ${files[*]}"
            echo "::error::예전 버전 파일이 남아있을 수 있어요. 오래된 파일을 삭제하고 최신 파일 하나만 남겨주세요."
            exit 1
          fi
          echo "배포 대상 파일: ${files[0]}"
          cp "${files[0]}" site/index.html

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 배포 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
